server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tulipdb?currentSchema=tulip}
    username: ${DB_USERNAME:tulip}
    password: ${DB_PASSWORD:tulip1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.tulipplus.auth.domain
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:tulipPlusSuperSecretKeyForJwtTokenGenerationMustBeLongerThan256Bits!!}
  access-token-validity-ms: 1800000        # 30 minutes
  refresh-token-validity-ms: 1209600000    # 14 days

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  level:
    com.tulipplus: DEBUG
    org.springframework.security: INFO
